<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AHRS PFD — Preview</title>
<style>
  :root {
    --sat: env(safe-area-inset-top,    0px);
    --sar: env(safe-area-inset-right,  0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left,   0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#000; overflow:hidden;
              -webkit-tap-highlight-color:transparent; }
  canvas { display:block; position:absolute; top:0; left:0; }

  #badge {
    position:absolute; top:6px; right:8px;
    background:rgba(0,100,210,.78); color:#fff;
    font:bold 11px/1 monospace; padding:3px 7px;
    border-radius:3px; pointer-events:none; z-index:10;
  }
  #scenario {
    position:absolute; bottom:56px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.55); color:rgba(255,210,60,.9);
    font:12px/1.4 monospace; padding:4px 10px; border-radius:3px;
    pointer-events:none; z-index:10; white-space:nowrap;
  }
  #terrain-status {
    position:absolute; top:6px; right:78px;
    font:bold 11px/1 monospace; padding:3px 7px;
    border-radius:3px; pointer-events:none; z-index:10;
  }
  .trn-ready   { background:rgba(0,130,60,.75);   color:#fff; }
  .trn-partial { background:rgba(160,100,0,.75);  color:#fff; }
  .trn-idle    { background:rgba(60,60,80,.80);   color:#aac; }
  .trn-loading { background:rgba(30,60,120,.80);  color:#adf; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="terrain-status" class="trn-loading">TERRAIN…</div>
<div id="badge">SIMULATOR</div>
<div id="scenario">Level flight</div>

<script src="terrain.js"></script>
<script>
'use strict';

// ── Simulator state ────────────────────────────────────────────────────────
// Starting position: Swiss Alps (Lauterbrunnen valley area) — dramatic terrain
// visible at ~8 000 ft with high alpine peaks above.
const SIM = {
  roll:0, pitch:1, yaw:210,
  lat:46.55, lon:7.90,   // Lauterbrunnen, Switzerland
  alt:8000,              // ft MSL  (Jungfrau is ~13 600 ft to the south)
  speed:115, track:210, vspeed:0, fix:3, sats:9,
  ay:0,                  // lateral acceleration g (slip ball)
  baro_hpa:1013.25, baro_src:'gps', gps_alt:8000,
  ahrs_ok:true, gps_ok:true, baro_ok:false,
  pitch_trim:0, roll_trim:0, yaw_trim:0,
};
const D = Object.assign({}, SIM);
// Expose simulator state on window so tools/render_iphone_previews.py can
// freeze the animation on a specific scenario frame for screenshot capture.
window._SIM       = SIM;
window._D         = D;

// ay: lateral acceleration g driving the slip ball.
// Coordinated flight → ay ≈ 0.  Deliberate slip/skid → non-zero ay.
const scenarios = [
  { label:'Level cruise heading south (Alps ahead)', dur:5000,
    fn(t) { return { roll:0, pitch:0.6, alt:8000+Math.sin(t*Math.PI*2)*30,
                     speed:115, vspeed:0, ay:0 }; } },
  { label:'Standard-rate right turn  (coordinated)', dur:5000,
    fn(t) { const r=19*Math.sin(Math.PI*t);
            return { roll:r, pitch:0.6+r*.04, alt:8100+r*2,
                     speed:115, vspeed:0, ay:0 }; } },
  { label:'Climbing left turn  +800 fpm', dur:5500,
    fn(t) { const r=-22*Math.sin(Math.PI*t), v=800*Math.sin(Math.PI*t);
            return { roll:r, pitch:4+r*.05, alt:8000+v*.06*t*5.5,
                     speed:112, vspeed:v, ay:0 }; } },
  { label:'Steep bank 45°  (slip demo)', dur:5000,
    fn(t) { const r=45*Math.sin(Math.PI*t);
            // Deliberate slip: ball deflects into the bank
            return { roll:r, pitch:1.5+Math.abs(r)*.06, alt:8300+r*5,
                     speed:118, vspeed:r*8, ay: r * 0.005 }; } },
  { label:'Descent into valley  -700 fpm', dur:6000,
    fn(t) { const v=t<.5?-700*(t/.5):-700*(1-(t-.5)/.5);
            return { roll:0, pitch:-3*Math.sin(Math.PI*t),
                     alt:8300+v/60*(t*6), speed:120, vspeed:v, ay:0 }; } },
  { label:'Turbulence  (random slip)', dur:5500,
    fn(t) { const n=s=>Math.sin(t*Math.PI*s*7)*.6+Math.sin(t*Math.PI*s*13)*.3
                          +Math.sin(t*Math.PI*s*23)*.1;
            return { roll:n(1)*10, pitch:n(2)*5+.5, alt:7800+n(3)*80,
                     speed:112+n(4)*8, vspeed:n(5)*350,
                     ay: n(6)*0.12 }; } },
];

let scIdx=0, scStart=null;
// Screenshot hook: set window._freeze to {idx, t01} to stop scenario cycling
// and pin SIM to a specific scenario frame.  Cleared by setting back to null.
window._scenarios = scenarios;
window._freezeScene = (idx, t01) => {
  const sc = scenarios[idx];
  if (!sc) return;
  Object.assign(SIM, sc.fn(t01));
  SIM.track = SIM.yaw;
  SIM.gps_alt = SIM.alt;
  Object.assign(D, SIM);       // skip smoothing so the screenshot is crisp
  const scEl = document.getElementById('scenario');
  if (scEl) scEl.textContent = sc.label + '  (frozen)';
  window._frozen = true;
};
const scEl=document.getElementById('scenario');
const trnEl=document.getElementById('terrain-status');

function tickSim(ts) {
  if (scStart===null) scStart=ts;
  const sc=scenarios[scIdx], age=ts-scStart, t01=Math.min(1,age/sc.dur);
  Object.assign(SIM, sc.fn(t01));
  // Very slow position drift along track so terrain scrolls gently
  const nm_per_frame = SIM.speed / 3600 / 60 * (1/60);  // approx nm at 60fps
  SIM.lat += nm_per_frame * Math.cos(SIM.yaw * Math.PI/180) / 60;
  SIM.lon += nm_per_frame * Math.sin(SIM.yaw * Math.PI/180) / (60 * Math.cos(SIM.lat * Math.PI/180));
  SIM.track   = SIM.yaw;
  SIM.gps_alt = SIM.alt;
  scEl.textContent=sc.label;
  if (age>=sc.dur){ scIdx=(scIdx+1)%scenarios.length; scStart=ts; }
}

// ── Terrain status ─────────────────────────────────────────────────────────
function onTerrainStatus(status, count) {
  const labels={idle:'NO TERRAIN',loading:'TERRAIN…',ready:'TERRAIN OK',
                partial:'TERRAIN ▲',error:'TERRAIN ERR'};
  const cls   ={idle:'trn-idle',loading:'trn-loading',ready:'trn-ready',
                partial:'trn-partial',error:'trn-idle'};
  trnEl.textContent=labels[status]||status.toUpperCase();
  trnEl.className  =cls[status]||'trn-idle';
}
Terrain.init(onTerrainStatus);

// ── Canvas & layout ────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx   =canvas.getContext('2d');
let W=0, H=0;
const L={};

function computeLayout() {
  const cs=getComputedStyle(document.documentElement);
  const sv=n=>parseFloat(cs.getPropertyValue(n))||0;
  L.safeT=sv('--sat'); L.safeR=sv('--sar');
  L.safeB=sv('--sab'); L.safeL=sv('--sal');
  L.cx=W/2; L.cy=H/2;
  L.hdgH=Math.max(38,H*0.10); L.hdgY=H-L.hdgH-L.safeB;
  L.tapeTopY=L.safeT+26; L.tapeBotY=L.hdgY;
  L.tapeH=L.tapeBotY-L.tapeTopY; L.tapeMidY=(L.tapeTopY+L.tapeBotY)/2;
  // Tape widths match pi4 ratios (SPD_W=89 / ALT_W=97 on 1024 wide ≈
  // 8.7% / 9.5% of display width).  Clamped so portrait viewports
  // don't collapse below the original iPhone dimensions.
  L.spdW=Math.max(72, Math.round(W*0.087)); L.spdX=L.safeL;
  L.altW=Math.max(82, Math.round(W*0.095)); L.altX=W-L.safeR-L.altW;
  L.rollR=Math.min(H*0.36,155);
  L.rollCY=L.rollR+Math.max(12,L.safeT+6);
  L.ballY=L.hdgY-36;
  const clipW=L.altX-(L.spdX+L.spdW);
  L.focal=clipW>0?(clipW/2)/Math.tan(35*Math.PI/180):300;
}
function resize(){
  W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
  computeLayout();
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

function _handleSpdTap(x,y){
  if(x>=L.spdX&&x<=L.spdX+L.spdW+14&&y>=L.tapeTopY&&y<=L.tapeBotY){
    speedUnit=speedUnit==='kt'?'mph':'kt';
    localStorage.setItem('speedUnit',speedUnit);
  }
}
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  _handleSpdTap(e.clientX-r.left,e.clientY-r.top);
});
canvas.addEventListener('touchend',e=>{
  const r=canvas.getBoundingClientRect(),t=e.changedTouches[0];
  _handleSpdTap(t.clientX-r.left,t.clientY-r.top);
},{passive:true});

// ── Unit preferences ───────────────────────────────────────────────────────
const HPA_TO_INHG=0.02953, INHG_TO_HPA=33.8639;
let speedUnit=localStorage.getItem('speedUnit')||'kt';
let qnhUnit  =localStorage.getItem('qnhUnit')  ||'hpa';
function toDisplaySpd(kt)  { return speedUnit==='mph'  ? kt*1.15078     : kt;  }
function toDisplayQNH(hpa) { return qnhUnit  ==='inhg' ? hpa*HPA_TO_INHG : hpa; }

// V-speeds (knots, always).  Matches Cessna 172S POH; override via
// localStorage 'vspeeds' JSON if user edits in a future flight-profile UI.
const V_DEFAULTS = { vs0:48, vs1:55, vfe:85, vno:129, vne:163, va:105, vy:74, vx:62 };
let V = Object.assign({}, V_DEFAULTS);
try { Object.assign(V, JSON.parse(localStorage.getItem('vspeeds')||'{}')); }
catch(e) {}
// Colours used for V-speed bands and drum-overspeed warnings.  Match the
// pi4 palette so all three displays (iPhone / Pi Zero / Pi 4) read the same.
const V_COL = { white:'#ffffff', green:'#1ec832', yellow:'#f0c800', red:'#dc1e1e' };

// User-set bugs — speed (kt), altitude (ft), heading (deg).  Stored in
// localStorage so they persist across reloads.  Numeric null ⇒ bug hidden.
const BUG_DEFAULTS = { spd_bug: 110, alt_bug: 8500, hdg_bug: 210 };
const B = Object.assign({}, BUG_DEFAULTS);
try { Object.assign(B, JSON.parse(localStorage.getItem('bugs') || '{}')); }
catch(e) {}
const BUG_MAGENTA = '#e100e1';   // GPS-derived (ground speed, GPS alt, GPS TRK)
const BUG_CYAN    = '#00dcdc';   // sensor-derived (IAS pitot, baro altimeter, MAG heading)

// ── Maths ──────────────────────────────────────────────────────────────────
const DEG=Math.PI/180;
function lerp(a,b,t){return a+(b-a)*t;}
function lerpAngle(a,b,t){let d=((b-a+540)%360)-180;return(a+d*t+360)%360;}
function smooth(alpha){
  D.roll   =lerp(D.roll,   SIM.roll,  alpha);
  D.pitch  =lerp(D.pitch,  SIM.pitch, alpha);
  D.yaw    =lerpAngle(D.yaw,SIM.yaw,  alpha);
  D.alt    =lerp(D.alt,    SIM.alt,   alpha);
  D.speed  =lerp(D.speed,  SIM.speed, alpha);
  D.vspeed =lerp(D.vspeed, SIM.vspeed,alpha);
  D.track  =lerpAngle(D.track,SIM.track,alpha);
  D.ay     =lerp(D.ay,     SIM.ay,   alpha);
  D.lat=SIM.lat; D.lon=SIM.lon; D.fix=SIM.fix; D.sats=SIM.sats;
  D.gps_alt=SIM.gps_alt;
  D.baro_hpa=SIM.baro_hpa; D.baro_src=SIM.baro_src;
  D.ahrs_ok=SIM.ahrs_ok; D.gps_ok=SIM.gps_ok; D.baro_ok=SIM.baro_ok;
  D.pitch_trim=SIM.pitch_trim; D.roll_trim=SIM.roll_trim; D.yaw_trim=SIM.yaw_trim;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function pillRect(x,y,w,h){
  const r=h/2; ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── Synthetic vision ───────────────────────────────────────────────────────
function drawAI(){
  const {cx,tapeMidY,focal}=L;
  const pitchOff=focal*Math.tan(D.pitch*DEG);
  const rollRad=-D.roll*DEG;
  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  ctx.translate(cx,tapeMidY); ctx.rotate(rollRad);
  const sg=ctx.createLinearGradient(0,-H*2,0,pitchOff);
  sg.addColorStop(0,'#0b1a2e'); sg.addColorStop(.6,'#1a5fa8'); sg.addColorStop(1,'#4a9fe0');
  ctx.fillStyle=sg; ctx.fillRect(-W*2,-H*2,W*4,H*2+pitchOff);
  const gg=ctx.createLinearGradient(0,pitchOff,0,H*2);
  gg.addColorStop(0,'#8b6810'); gg.addColorStop(.4,'#5a3e0a'); gg.addColorStop(1,'#2a1a03');
  ctx.fillStyle=gg; ctx.fillRect(-W*2,pitchOff,W*4,H*2);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.moveTo(-W*2,pitchOff); ctx.lineTo(W*2,pitchOff); ctx.stroke();
  ctx.shadowBlur=0;
  const shortL=W*.10, longL=W*.18;
  ctx.font=`${Math.max(11,H*.025)}px monospace`;
  for(let deg=-30;deg<=30;deg+=5){
    if(deg===0) continue;
    const y=pitchOff-focal*Math.tan(deg*DEG), half=deg%10===0?longL:shortL, td=deg>0?1:-1;
    ctx.strokeStyle='#fff'; ctx.lineWidth=deg%10===0?1.8:1.2;
    ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=3;
    ctx.beginPath(); ctx.moveTo(-half,y); ctx.lineTo(half,y); ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(-half,y); ctx.lineTo(-half,y+td*8);
    ctx.moveTo( half,y); ctx.lineTo( half,y+td*8);
    ctx.stroke(); ctx.shadowBlur=0;
    if(deg%10===0){
      ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=3;
      ctx.textAlign='right'; ctx.textBaseline='middle';
      ctx.fillText(Math.abs(deg),-half-8,y);
      ctx.textAlign='left'; ctx.fillText(Math.abs(deg),half+8,y);
      ctx.shadowBlur=0;
    }
  }
  ctx.textBaseline='alphabetic'; ctx.restore();
}

// ── Roll arc ───────────────────────────────────────────────────────────────
function drawRollIndicator(){
  const{cx,rollR,rollCY}=L;
  ctx.save(); ctx.translate(cx,rollCY);
  ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,0,rollR,-150*DEG,-30*DEG); ctx.stroke();
  [0,10,20,30,45,60].forEach(deg=>{
    [-deg,deg].forEach(a=>{
      const angle=(-90+a)*DEG, len=deg===0?18:deg%30===0?14:10;
      ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=deg===0?2:1.2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle)*(rollR-len),Math.sin(angle)*(rollR-len));
      ctx.lineTo(Math.cos(angle)*rollR,      Math.sin(angle)*rollR);
      ctx.stroke();
    });
  });
  const ra=(-90-D.roll)*DEG;
  ctx.save();
  ctx.translate(Math.cos(ra)*(rollR-2),Math.sin(ra)*(rollR-2));
  ctx.rotate(ra+Math.PI/2);
  ctx.fillStyle='#fff'; ctx.strokeStyle='rgba(0,0,0,.6)'; ctx.lineWidth=.6;
  ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-6,0); ctx.lineTo(6,0);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore(); ctx.restore();
}

// ── Slip ball ──────────────────────────────────────────────────────────────
function drawSlipBall(){
  const{cx,ballY}=L; const bw=54,bh=16,r=6;
  pillRect(cx-bw/2,ballY-bh/2,bw,bh);
  ctx.fillStyle='rgba(0,0,0,.60)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.65)'; ctx.lineWidth=1.2; ctx.stroke();
  // Fixed reference lines (gap slightly wider than ball diameter)
  const mark=r+4;
  ctx.strokeStyle='rgba(255,255,255,.95)'; ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.moveTo(cx-mark,ballY-bh/2+2); ctx.lineTo(cx-mark,ballY+bh/2-2);
  ctx.moveTo(cx+mark,ballY-bh/2+2); ctx.lineTo(cx+mark,ballY+bh/2-2);
  ctx.stroke();
  const defl=Math.max(-1,Math.min(1,D.ay/0.2))*(bw/2-r-2);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+defl,ballY,r,0,Math.PI*2); ctx.fill();
}

// ── TAWS proximity alert ──────────────────────────────────────────────────
// Ported from pi4/pfd.py _update_terrain_alert + draw_terrain_alert.
// Thresholds match the Pi displays: 500 ft clearance → amber TERRAIN
// CAUTION (steady), 100 ft clearance → red PULL UP (1 Hz flash).
const TAWS = { level: 0, lastCheckMs: 0 };
const FT_PER_M = 3.28084;
// Screenshot hook: tools/render_iphone_previews.py pokes this from Playwright
// to capture banner-on scenes without needing actual terrain data loaded.
window._forceTawsLevel = (n) => {
  TAWS.level = n;
  TAWS.lastCheckMs = performance.now() + 5000;   // lock out the real update
  window._tawsNoFlash = true;                    // disable flash in screenshots
};

function updateTerrainAlert() {
  // Throttle to ~5 Hz — elevation lookup is cheap but still not free.
  const now = performance.now();
  if (now - TAWS.lastCheckMs < 200) return;
  TAWS.lastCheckMs = now;
  if (!D.fix || D.fix === 0) { TAWS.level = 0; return; }
  if (typeof Terrain === 'undefined' || !Terrain.elevationAt) return;
  const elevM = Terrain.elevationAt(D.lat, D.lon);
  if (elevM === null || elevM === undefined || !isFinite(elevM)) {
    TAWS.level = 0; return;
  }
  const clearanceFt = D.alt - elevM * FT_PER_M;
  TAWS.level = clearanceFt < 100 ? 2
             : clearanceFt < 500 ? 1 : 0;
}

function drawTerrainAlert() {
  if (TAWS.level === 0) return;
  // Flash red warning at 1 Hz (disabled when _tawsNoFlash is set — used by
  // the screenshot tool to capture a definite on-phase for documentation).
  if (TAWS.level === 2 && !window._tawsNoFlash
      && (Math.floor(performance.now() / 500) % 2) === 1) return;
  const bw = Math.max(140, W * 0.18);
  const bh = Math.max(22, H * 0.06);
  const bx = W / 2 - bw / 2;
  const by = L.safeT + 30;
  const warn = TAWS.level === 2;
  ctx.fillStyle   = warn ? '#b40000' : '#a06e00';
  ctx.strokeStyle = warn ? '#ffffff' : '#ffe000';
  ctx.lineWidth   = 1.5;
  roundRect(bx, by, bw, bh, 4);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle    = warn ? '#ffffff' : '#ffe000';
  ctx.font         = `bold ${Math.max(14, H * 0.034)}px monospace`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(warn ? 'PULL UP  TERRAIN' : 'TERRAIN  CAUTION',
               bx + bw / 2, by + bh / 2);
  ctx.textBaseline = 'alphabetic';
}


// ── Veeder-Root rolling drum ──────────────────────────────────────────────
// Ported from pi4/pfd.py _rolling_drum().  Renders n_digits of `value` as
// independent vertical drums that cascade smoothly — when the ones digit
// approaches 9→0, the tens digit slides to its next value over the last
// 10% of the cycle.  At any moment the "current" digit sits at the middle
// of the cell and the "next-higher" digit peeks in from the top (scroll=0)
// or moves down into view (scroll→slotH).  show_adjacent=true also renders
// the previous digit below and one more above so crossings through 10 /
// 100 / 1000 are obviously in progress (d_hi2 preview — matches altimeter).
function drawDrum(x, y, w, h, value, nDigits, color, fontSz, opts){
  opts = opts || {};
  const suppressLeading = !!opts.suppressLeading;
  const powerOffset     = opts.powerOffset || 0;
  const showAdjacent    = !!opts.showAdjacent;
  const slotH           = showAdjacent ? (opts.adjSlotH || h * 0.45) : h;
  const charW           = w / nDigits;
  const absV            = Math.abs(value);
  const valInt          = Math.round(absV);

  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.font = `bold ${fontSz}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;

  for (let col = 0; col < nDigits; col++) {
    const power = powerOffset + nDigits - 1 - col;
    if (suppressLeading && power > 0 && valInt < Math.pow(10, power)) continue;

    let dCont;
    if (power === 0) {
      dCont = absV % 10;
    } else {
      const lowerCont = (absV % Math.pow(10, power)) / Math.pow(10, power - 1);
      const carry     = Math.max(0, lowerCont - 9);
      const dLoInt    = Math.floor(absV / Math.pow(10, power)) % 10;
      dCont = dLoInt + carry;
    }
    const dLo   = Math.floor(dCont);
    const frac  = dCont - dLo;
    const dHi   = (dLo + 1) % 10;
    const scroll= frac * slotH;
    const cxCol = x + col * charW + charW / 2;
    const tyLo  = y + h / 2 + scroll;

    ctx.fillText(String(dLo), cxCol, tyLo);
    ctx.fillText(String(dHi), cxCol, tyLo - slotH);
    if (showAdjacent) {
      const dPrev = (dLo + 9) % 10;
      const dHi2  = (dLo + 2) % 10;
      ctx.fillText(String(dPrev), cxCol, tyLo + slotH);
      ctx.fillText(String(dHi2),  cxCol, tyLo - 2 * slotH);
    }
  }
  ctx.restore();
}


// ── Rounded polygon path ─────────────────────────────────────────────────
// Build a Canvas path from a list of [x, y] vertices, rounding the corners
// at the indices in roundSet with radius r (sharp elsewhere).  Matches the
// pi4 _chamfer helper used on the stepped Veeder-Root boxes.  The path is
// closed after the last vertex; caller calls ctx.fill() / ctx.stroke().
function roundedPolyPath(verts, roundSet, r){
  const n = verts.length;
  // Start at a non-rounded vertex so the initial moveTo isn't inside a
  // fillet — arcTo(x1,y1,x2,y2,r) needs a known current-point tangent.
  let start = 0;
  for (let i = 0; i < n; i++) if (!roundSet.has(i)) { start = i; break; }
  ctx.beginPath();
  ctx.moveTo(verts[start][0], verts[start][1]);
  for (let k = 1; k <= n; k++) {
    const i = (start + k) % n;
    if (roundSet.has(i)) {
      const nx = verts[(i + 1) % n];
      ctx.arcTo(verts[i][0], verts[i][1], nx[0], nx[1], r);
    } else {
      ctx.lineTo(verts[i][0], verts[i][1]);
    }
  }
  ctx.closePath();
}

// ── Drum shading ──────────────────────────────────────────────────────────
// Overlay a top-and-bottom fade to dark on a drum cell so the rolling
// digits fade out at the clip edges — matches the pi4 _drum_shade pygame
// helper and sells the "physical drum behind a window" illusion.
function _drumShade(x, y, w, h){
  const cut = Math.max(3, h * 0.24);
  const g1 = ctx.createLinearGradient(0, y, 0, y + cut);
  g1.addColorStop(0, 'rgba(0,0,0,.75)'); g1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g1; ctx.fillRect(x, y, w, cut);
  const g2 = ctx.createLinearGradient(0, y + h - cut, 0, y + h);
  g2.addColorStop(0, 'rgba(0,0,0,0)'); g2.addColorStop(1, 'rgba(0,0,0,.75)');
  ctx.fillStyle = g2; ctx.fillRect(x, y + h - cut, w, cut);
}


// ── Aircraft symbol ────────────────────────────────────────────────────────
function drawAircraftSymbol(){
  // Amber swept-delta reference airplane ported from pi4/pfd.py.
  // Apex at AI centre; trailing edges slope back and down to wingtips.
  // Each wing has two triangular strips (lighter outer / darker inner) so the
  // shape reads at a glance against any terrain background, and a pair of
  // engine nacelles outboard of the wingtips reinforce the silhouette.
  const {cx, tapeMidY} = L;
  const ws = Math.min(W * 0.10, 88);   // wingtip half-span
  const wi = ws * 0.613;                // inner trailing-edge x
  const wm = ws * 0.806;                // colour-split x along trailing edge
  const wh = ws * 0.473;                // wing vertical drop to trailing edge
  const nac = ws * 1.484;               // nacelle outer x
  const nin = ws * 1.065;               // nacelle inboard x (angled tip)
  const nh  = Math.max(3, ws * 0.065);  // nacelle half-height
  const AMBER      = '#ffbe1e';
  const AMBER_DARK = '#b47800';

  ctx.save();
  ctx.translate(cx, tapeMidY);
  ctx.lineJoin = 'miter';

  // Wing trailing-edge strips — inner (darker) + outer (lighter) per side
  function fillTri(pts, col){
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath(); ctx.fill();
  }
  fillTri([[0,0], [-wm, wh], [-wi, wh]], AMBER_DARK);
  fillTri([[0,0], [-ws, wh], [-wm, wh]], AMBER);
  fillTri([[0,0], [ wi, wh], [ wm, wh]], AMBER_DARK);
  fillTri([[0,0], [ wm, wh], [ ws, wh]], AMBER);

  // Engine nacelles — upper half lighter amber, lower half darker
  fillTri([[-ws, 0], [-nin, -nh], [-nac, -nh], [-nac, 0]], AMBER);
  fillTri([[-ws, 0], [-nac, 0], [-nac,  nh], [-nin,  nh]], AMBER_DARK);
  fillTri([[ ws, 0], [ nin, -nh], [ nac, -nh], [ nac, 0]], AMBER);
  fillTri([[ ws, 0], [ nac, 0], [ nac,  nh], [ nin,  nh]], AMBER_DARK);

  // Perimeter outlines — skip the inner colour-split edge so the amber
  // stays crisp across the fill boundary.
  ctx.strokeStyle = '#000';
  ctx.lineWidth   = 1;
  function strokePath(pts){
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath(); ctx.stroke();
  }
  strokePath([[0,0], [-ws, wh], [-wi, wh]]);
  strokePath([[0,0], [ wi, wh], [ ws, wh]]);
  strokePath([[-ws, 0], [-nin, -nh], [-nac, -nh], [-nac, nh], [-nin, nh]]);
  strokePath([[ ws, 0], [ nin, -nh], [ nac, -nh], [ nac, nh], [ nin, nh]]);

  ctx.restore();
}

// ── Speed tape ─────────────────────────────────────────────────────────────
function drawSpeedTape(){
  const{spdX,spdW,tapeTopY,tapeH,tapeMidY}=L;
  const spd=toDisplaySpd(D.speed);
  // Visible tape range matches pi4 (PX_PER_KT = TAPE_H / 120).  MPH mode
  // widens to 140 so the same physical speed range stays on screen.
  const spdRange=speedUnit==='mph'?140:120, pxPerSpd=tapeH/spdRange;
  const fs=Math.max(10,H*.021);
  ctx.fillStyle='rgba(0,8,25,.80)'; ctx.fillRect(spdX,tapeTopY,spdW,tapeH);
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(spdX+spdW,tapeTopY); ctx.lineTo(spdX+spdW,tapeTopY+tapeH); ctx.stroke();

  // V-speed colour arcs (right edge of tape) — ported from pi4/pfd.py
  // draw_speed_tape().  V-speeds are stored in kt; convert to display unit
  // with the same factor applied to `spd` above so band positions track
  // correctly when the user toggles kt ↔ mph.
  const _band=(vLoKt, vHiKt, col, barX, barW)=>{
    const y1=tapeMidY-(toDisplaySpd(vHiKt)-spd)*pxPerSpd;
    const y2=tapeMidY-(toDisplaySpd(vLoKt)-spd)*pxPerSpd;
    const y1c=Math.max(tapeTopY, Math.min(tapeTopY+tapeH, y1));
    const y2c=Math.max(tapeTopY, Math.min(tapeTopY+tapeH, y2));
    if (y1c<y2c) { ctx.fillStyle=col; ctx.fillRect(barX, y1c, barW, y2c-y1c); }
  };
  _band(V.vs0, V.vfe, V_COL.white,  spdX+spdW-10, 3);   // flap range
  _band(V.vs1, V.vno, V_COL.green,  spdX+spdW-5,  4);   // normal ops
  _band(V.vno, V.vne, V_COL.yellow, spdX+spdW-5,  4);   // caution range
  const vneY=tapeMidY-(toDisplaySpd(V.vne)-spd)*pxPerSpd;
  if (vneY>tapeTopY && vneY<tapeTopY+tapeH) {
    ctx.strokeStyle=V_COL.red; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(spdX+spdW-16, vneY); ctx.lineTo(spdX+spdW, vneY); ctx.stroke();
  }
  const spdLabel=speedUnit==='mph'?'GS MPH\u25be':'GS KT\u25be';
  ctx.fillStyle='rgba(160,210,255,.85)'; ctx.font=`${Math.max(9,H*.018)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText(spdLabel,spdX+spdW/2,tapeTopY+4);
  ctx.save(); ctx.beginPath(); ctx.rect(spdX,tapeTopY,spdW,tapeH); ctx.clip();
  const spdBase=Math.round(spd/20)*20;
  for(let v=spdBase-120;v<=spdBase+120;v+=20){
    if(v<0) continue;
    const y=tapeMidY-(v-spd)*pxPerSpd;
    // Skip the central strip occluded by the stepped readout box (halfOut
    // is the outer-cell half-height declared just below — we pre-compute
    // it here so the tick skip region matches exactly).
    if(Math.abs(y-tapeMidY)<Math.max(18,H*0.057)+4) continue;
    ctx.strokeStyle='rgba(255,255,255,.80)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(spdX+spdW,y); ctx.lineTo(spdX+spdW-14,y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.90)'; ctx.font=`${fs}px monospace`;
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(v.toString(),spdX+spdW-17,y);
  }
  ctx.restore();

  // ── Speed bug chevron — drawn BEFORE the readout box so the box covers
  // the bug when it's near the current-speed value (matches pi4 layer order).
  if (B.spd_bug != null) {
    const bugY = Math.max(tapeTopY, Math.min(tapeTopY+tapeH,
                   tapeMidY-(toDisplaySpd(B.spd_bug)-spd)*pxPerSpd));
    const x = spdX, w = 14, h = 17;
    ctx.fillStyle = BUG_MAGENTA;
    ctx.beginPath();
    ctx.moveTo(x,     bugY-h);
    ctx.lineTo(x+w,   bugY-h);
    ctx.lineTo(x+w,   bugY-5);
    ctx.lineTo(x+7,   bugY);
    ctx.lineTo(x+w,   bugY+5);
    ctx.lineTo(x+w,   bugY+h);
    ctx.lineTo(x,     bugY+h);
    ctx.closePath(); ctx.fill();
  }

  // ── Veeder-Root stepped readout box (pi4 style, rounded at the steps) ──
  // Speed tape layout (left→right across the tape):
  //   • pointer apex on LEFT  (at spdX)
  //   • inner cell — shorter — holds the tens+hundreds drum
  //   • outer cell — taller  — holds the ones drum with show_adjacent
  // Dimensions grown from the previous iteration; rounded corners at the
  // inner/outer step joins + the outer-cell far corners (r=3) match the
  // pi4 _chamfer applied to the same polygon.
  const drumFs    = Math.max(18, H * 0.050);
  const halfIn    = Math.round(drumFs * 0.85);
  const halfOut   = Math.round(drumFs * 1.40);
  const ptrR      = Math.round(drumFs * 0.78);
  const innW      = Math.round(drumFs * 1.70);
  const drmSw     = Math.round(drumFs * 1.05);
  const innR      = ptrR + innW;
  const boxR      = innR + drmSw;
  const sp        = spdX;
  const mid       = tapeMidY;
  const boxVerts = [
    [sp,         mid],             // 0 — pointer tip (SHARP)
    [sp + ptrR,  mid - halfIn],    // 1 — pointer → inner cell (SHARP)
    [sp + innR,  mid - halfIn],    // 2 — inner top-right (ROUND)
    [sp + innR,  mid - halfOut],   // 3 — step up (ROUND)
    [sp + boxR,  mid - halfOut],   // 4 — outer top-right (ROUND)
    [sp + boxR,  mid + halfOut],   // 5 — outer bottom-right (ROUND)
    [sp + innR,  mid + halfOut],   // 6 — step down (ROUND)
    [sp + innR,  mid + halfIn],    // 7 — inner bottom-right (ROUND)
    [sp + ptrR,  mid + halfIn],    // 8 — pointer bottom (SHARP)
  ];
  roundedPolyPath(boxVerts, new Set([2,3,4,5,6,7]), 3);
  ctx.fillStyle='#000a1e'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.lineJoin='miter'; ctx.stroke();

  // Digit colour reflects over-speed state: red > Vne, amber > Vno.
  const spdKt   = D.speed;
  const drumCol = spdKt > V.vne ? V_COL.red
                : spdKt > V.vno ? V_COL.yellow : '#fff';

  drawDrum(sp + ptrR + 1, mid - halfIn + 1, innW - 2, halfIn * 2 - 2,
           spd, 2, drumCol, drumFs,
           {suppressLeading: true, powerOffset: 1});
  drawDrum(sp + innR + 1, mid - halfOut + 1, drmSw - 2, halfOut * 2 - 2,
           spd, 1, drumCol, drumFs,
           {showAdjacent: true, adjSlotH: Math.round(drumFs * 1.20)});
  _drumShade(sp + innR + 1, mid - halfOut + 1, drmSw - 2, halfOut * 2 - 2);

  ctx.textBaseline='alphabetic';
}

// ── Altitude tape ──────────────────────────────────────────────────────────
function drawAltTape(){
  const{altX,altW,tapeTopY,tapeH,tapeMidY}=L;
  const pxPerFt=tapeH/600,alt=D.alt;
  const fs=Math.max(10,H*.021);
  ctx.fillStyle='rgba(0,8,25,.80)'; ctx.fillRect(altX,tapeTopY,altW,tapeH);
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(altX,tapeTopY); ctx.lineTo(altX,tapeTopY+tapeH); ctx.stroke();
  ctx.fillStyle='rgba(160,210,255,.85)'; ctx.font=`${Math.max(9,H*.018)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='top'; ctx.fillText('ALT FT',altX+altW/2,tapeTopY+4);
  ctx.save(); ctx.beginPath(); ctx.rect(altX,tapeTopY,altW,tapeH); ctx.clip();
  const baseAlt=Math.round(alt/100)*100;
  for(let ft=baseAlt-300;ft<=baseAlt+300;ft+=100){
    const y=tapeMidY-(ft-alt)*pxPerFt;
    if(Math.abs(y-tapeMidY)<Math.max(21,H*0.067)+4) continue;
    const isMaj=ft%500===0,tlen=isMaj?16:8;
    ctx.strokeStyle=isMaj?'rgba(255,255,255,.85)':'rgba(255,255,255,.45)';
    ctx.lineWidth=isMaj?1.8:1;
    ctx.beginPath(); ctx.moveTo(altX,y); ctx.lineTo(altX+tlen,y); ctx.stroke();
    if(ft%200===0){
      ctx.fillStyle=isMaj?'rgba(255,255,255,.95)':'rgba(255,255,255,.80)';
      ctx.font=`${isMaj?fs+1:fs}px monospace`;
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(ft.toString(),altX+tlen+3,y);
    }
  }
  ctx.restore();

  // ── Altitude bug chevron — drawn BEFORE the readout box (matches pi4
  // layer order: box covers the bug when it's near current altitude).
  if (B.alt_bug != null) {
    const bugY = Math.max(tapeTopY, Math.min(tapeTopY+tapeH,
                   tapeMidY-(B.alt_bug-alt)*pxPerFt));
    const x = altX+altW, w = 14, h = 17;
    ctx.fillStyle = D.baro_src === 'bme280' ? BUG_CYAN : BUG_MAGENTA;
    ctx.beginPath();
    ctx.moveTo(x,     bugY-h);
    ctx.lineTo(x-w,   bugY-h);
    ctx.lineTo(x-w,   bugY-5);
    ctx.lineTo(x-7,   bugY);
    ctx.lineTo(x-w,   bugY+5);
    ctx.lineTo(x-w,   bugY+h);
    ctx.lineTo(x,     bugY+h);
    ctx.closePath(); ctx.fill();
  }

  // ── Veeder-Root stepped readout box (pi4 style, rounded at the steps) ──
  // Mirror of the speed box: pointer apex on RIGHT (at altX+altW), then
  // going LEFT we get the ones-drum outer cell (tall) and the main drum
  // inner cell (hundreds+thousands+ten-thousands).
  const altDrumFs = Math.max(18, H * 0.048);
  const aHalfIn  = Math.round(altDrumFs * 0.85);
  const aHalfOut = Math.round(altDrumFs * 1.40);
  const aPtrW    = Math.round(altDrumFs * 0.78);
  const aDrmW    = Math.round(altDrumFs * 1.20);
  const aInnW    = Math.round(altDrumFs * 3.00);
  const aDrmL    = aPtrW + aDrmW;
  const aBoxW    = aInnW + aDrmW + aPtrW;
  const R        = altX + altW;
  const midA     = tapeMidY;
  const altVerts = [
    [R,             midA],              // 0 — pointer tip (SHARP)
    [R - aPtrW,     midA - aHalfIn],    // 1 — pointer base (SHARP)
    [R - aPtrW,     midA - aHalfOut],   // 2 — step up (ROUND)
    [R - aDrmL,     midA - aHalfOut],   // 3 — ones cell top-left (ROUND)
    [R - aDrmL,     midA - aHalfIn],    // 4 — step down (ROUND)
    [R - aBoxW,     midA - aHalfIn],    // 5 — main cell top-left (ROUND)
    [R - aBoxW,     midA + aHalfIn],    // 6 — main cell bottom-left (ROUND)
    [R - aDrmL,     midA + aHalfIn],    // 7 — step up (ROUND)
    [R - aDrmL,     midA + aHalfOut],   // 8 — ones cell bottom-left (ROUND)
    [R - aPtrW,     midA + aHalfOut],   // 9 — step down (ROUND)
    [R - aPtrW,     midA + aHalfIn],    // 10 — pointer base bottom (SHARP)
  ];
  roundedPolyPath(altVerts, new Set([2,3,4,5,6,7,8,9]), 3);
  ctx.fillStyle='#000a1e'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.lineJoin='miter'; ctx.stroke();

  drawDrum(R - aBoxW + 1, midA - aHalfIn + 1, aInnW - 2, aHalfIn * 2 - 2,
           alt, 3, '#fff', altDrumFs,
           {suppressLeading: true, powerOffset: 2});
  drawDrum(R - aDrmL + 1, midA - aHalfOut + 1, aDrmW - 2, aHalfOut * 2 - 2,
           alt, 2, '#fff', altDrumFs,
           {showAdjacent: true, adjSlotH: Math.round(altDrumFs * 1.20)});
  _drumShade(R - aDrmL + 1, midA - aHalfOut + 1, aDrmW - 2, aHalfOut * 2 - 2);
  const vsiY=midA+aHalfOut+5,arrow=D.vspeed>30?'▲':D.vspeed<-30?'▼':'—';
  const vcol=D.vspeed>100?'#0f0':D.vspeed<-100?'#f80':'#aaa';
  ctx.fillStyle=vcol; ctx.font=`${Math.max(10,H*.022)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(`${arrow}${Math.abs(Math.round(D.vspeed/10)*10)}`,altX+altW/2,vsiY);
  const fpmLblY=vsiY+Math.max(13,H*.026);
  ctx.fillStyle='rgba(140,175,210,.7)'; ctx.font=`${Math.max(8,H*.016)}px monospace`;
  ctx.fillText('fpm',altX+altW/2,fpmLblY);
  // QNH and altitude source
  const qnhY=fpmLblY+Math.max(11,H*.019)+2;
  const isBaro=D.baro_src==='bme280';
  const isInHg=qnhUnit==='inhg', qnhDisp=toDisplayQNH(D.baro_hpa);
  ctx.fillStyle=isBaro?'rgba(80,200,255,.90)':'rgba(140,175,210,.50)';
  ctx.font=`${Math.max(8,H*.016)}px monospace`;
  ctx.fillText(isInHg?qnhDisp.toFixed(2)+'\u2033':qnhDisp.toFixed(2),altX+altW/2,qnhY);
  ctx.fillText(isInHg?(isBaro?'Hg B':'Hg G'):(isBaro?'hPa B':'hPa G'),altX+altW/2,qnhY+Math.max(10,H*.017));
  ctx.textBaseline='alphabetic';
}

// ── Heading tape ───────────────────────────────────────────────────────────
const CARDS={0:'N',45:'NE',90:'E',135:'SE',180:'S',225:'SW',270:'W',315:'NW'};
function drawHeadingTape(){
  const{hdgY,hdgH,cx}=L; const pxPerDeg=W/60,hdg=D.yaw;
  ctx.fillStyle='rgba(0,8,22,.82)'; ctx.fillRect(0,hdgY,W,hdgH);
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,hdgY); ctx.lineTo(W,hdgY); ctx.stroke();
  ctx.font=`${Math.max(10,H*.022)}px monospace`; ctx.textBaseline='bottom';
  for(let i=-34;i<=34;i++){
    const deg=((Math.round(hdg)+i+3600)%360);
    const offset=i-(hdg-Math.round(hdg)),x=cx+offset*pxPerDeg;
    if(x<0||x>W) continue;
    if(deg%5===0){
      const th=deg%10===0?hdgH*.35:hdgH*.18;
      ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=deg%10===0?1.5:1;
      ctx.beginPath(); ctx.moveTo(x,hdgY); ctx.lineTo(x,hdgY+th); ctx.stroke();
    }
    if(deg%10===0){
      const label=CARDS[deg]||deg.toString().padStart(3,'0');
      ctx.fillStyle=CARDS[deg]?'#ffd700':'rgba(255,255,255,.9)';
      ctx.textAlign='center'; ctx.fillText(label,x,hdgY+hdgH-3);
    }
  }
  const bw=58,bh=22;
  roundRect(cx-bw/2,hdgY-bh-2,bw,bh,3);
  ctx.fillStyle='rgba(0,0,0,.88)'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.max(13,H*.030)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(Math.round(D.yaw).toString().padStart(3,'0'),cx,hdgY-bh/2-2);
  ctx.fillStyle='#ffd700';
  ctx.beginPath(); ctx.moveTo(cx,hdgY-1); ctx.lineTo(cx-7,hdgY-9); ctx.lineTo(cx+7,hdgY-9);
  ctx.closePath(); ctx.fill(); ctx.textBaseline='alphabetic';

  // Heading bug chevron — downward-pointing V along the top of the heading
  // strip, clamped between the speed and altitude tapes.  Port of pi4.
  if (B.hdg_bug != null) {
    const off = ((B.hdg_bug - hdg + 540) % 360) - 180;
    let hbx = cx + off * pxPerDeg;
    hbx = Math.max(L.spdX+L.spdW+20, Math.min(L.altX-20, hbx));
    if (Math.abs(off) <= 30) {   // only show when within visible arc
      ctx.fillStyle = BUG_CYAN;   // MAG heading source (default on iPhone)
      ctx.beginPath();
      ctx.moveTo(hbx-17, hdgY+14);
      ctx.lineTo(hbx-17, hdgY);
      ctx.lineTo(hbx-5,  hdgY);
      ctx.lineTo(hbx,    hdgY+7);
      ctx.lineTo(hbx+5,  hdgY);
      ctx.lineTo(hbx+17, hdgY);
      ctx.lineTo(hbx+17, hdgY+14);
      ctx.closePath(); ctx.fill();
    }
  }
}

// ── GPS status ─────────────────────────────────────────────────────────────
function drawGPSStatus(){
  const x=L.safeL+10,y=L.safeT+8;
  const label=D.fix===0?'NO FIX':D.fix===1?'GPS':'DGPS';
  const col  =D.fix===0?'#f44':D.fix===1?'#fa0':'#0d0';
  ctx.fillStyle=col; ctx.font=`bold ${Math.max(10,H*.022)}px monospace`;
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=4;
  ctx.fillText(`${label} ${D.sats}sat`,x,y);
  ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
}

// ── Failure overlay ────────────────────────────────────────────────────────
function drawRedX(x,y,w,h,label){
  ctx.save();
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(x,y,w,h);
  const pad=Math.min(w,h)*.12;
  ctx.strokeStyle='#cc0000';
  ctx.lineWidth=Math.max(2,Math.min(w,h)*.06);
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x+pad,y+pad); ctx.lineTo(x+w-pad,y+h-pad);
  ctx.moveTo(x+w-pad,y+pad); ctx.lineTo(x+pad,y+h-pad);
  ctx.stroke();
  if(label){
    ctx.fillStyle='#cc0000';
    ctx.font=`bold ${Math.max(10,Math.min(w*.15,14))}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText(label,x+w/2,y+h-4);
  }
  ctx.restore();
}

// ── Render loop ────────────────────────────────────────────────────────────
let lastTs=null;
function render(ts){
  if(lastTs===null) lastTs=ts;
  const dt=ts-lastTs; lastTs=ts;
  if (!window._frozen) {
    tickSim(ts);
    smooth(Math.min(1,dt/60));
  }
  updateTerrainAlert();
  ctx.clearRect(0,0,W,H);
  drawAI();
  Terrain.render(ctx, D, L);   // SVS on top of sky/ground, behind instruments
  drawRollIndicator();
  drawSlipBall();
  drawAircraftSymbol();
  drawSpeedTape();
  drawAltTape();
  drawHeadingTape();
  drawGPSStatus();
  drawTerrainAlert();
  if(!D.ahrs_ok){
    drawRedX(L.spdX+L.spdW,L.tapeTopY,L.altX-(L.spdX+L.spdW),L.tapeH,'AHRS');
    drawRedX(0,L.hdgY,W,H-L.hdgY,'HDG');
  }
  if(!D.gps_ok) drawRedX(L.spdX,L.tapeTopY,L.spdW,L.tapeH,'GPS');
  if(!D.baro_ok&&!D.gps_ok) drawRedX(L.altX,L.tapeTopY,L.altW,L.tapeH,'ALT');
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
